# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# Config letta da CodeRabbit dal branch in review (head). Gli esclusi sotto non
# contano verso il limite di file di una PR, cosi le PR grandi restano recensibili
# e la review resta focalizzata sul codice vero (non su deletions e dati generati).
language: it-IT
reviews:
  path_filters:
    # Vecchia integrazione: cancellata dal rename haier_hon -> addhon. Solo deletions, nessun valore di review.
    - "!custom_components/haier_hon/**"
    # Libreria vendorizzata (rimossa dal distacco da pyhОn): codice di terzi, niente review.
    - "!**/_vendor/**"
    # Snapshot golden generati con GEN_GOLDEN=1: dati, non codice.
    - "!tests/golden/**"
    # Dump REF reale anonimizzato usato come fixture: dati di test, non codice.
    - "!tests/fixtures/**"
